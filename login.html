<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Security Management Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .auth-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .auth-card {
        width: min(520px, 100%);
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        padding: 18px;
      }

      .auth-card h2 {
        margin: 0 0 6px;
      }

      .auth-card p {
        margin: 0 0 14px;
        color: #4b5870;
        font-size: 14px;
      }

      .auth-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .auth-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      .auth-error {
        display: none;
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px solid #f0c0c0;
        background: #fff6f6;
        color: #8b1a1a;
        border-radius: 10px;
        font-size: 14px;
      }

      .auth-hint {
        margin-top: 12px;
        padding: 10px 12px;
        border: 1px solid #d6deec;
        background: #f8faff;
        border-radius: 10px;
        font-size: 13px;
        color: #3b4862;
      }
    </style>
  </head>
  <body>
    <header class="top-bar">
      <div class="brand-block">
        <img class="brand-logo" src="logo.jpeg" alt="Pristine Extrusions Logo" />
        <div>
          <h1>Pristine Extrusions</h1>
          <p>Security Management Dashboard</p>
        </div>
      </div>
      <p class="top-bar-note">Login required</p>
    </header>

    <main class="auth-wrap">
      <section class="auth-card">
        <h2>Login</h2>
        <p>Use your username and password to access the system.</p>

        <form id="loginForm" class="auth-grid" autocomplete="on">
          <label>
            Username
            <input type="text" name="username" required />
          </label>
          <label>
            Password
            <input type="password" name="password" required />
          </label>

          <div class="auth-actions">
            <button type="submit">Login</button>
            <button type="button" id="adminLoginBtn" class="secondary-btn">Admin Login</button>
          </div>

          <div id="loginError" class="auth-error"></div>
        </form>
      </section>
    </main>

    <script src="auth.js"></script>
    <script src="login.js"></script>
  </body>
</html>
